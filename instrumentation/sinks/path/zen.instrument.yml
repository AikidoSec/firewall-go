meta:
  name: path
  description: Protection from Local File Inclusion (LFI) Attacks.

rules:
  # Inject go:linkname declaration for ExamineDeferred
  - id: path.Examine.linkname
    type: inject-decl
    package: path
    anchor: Join
    links:
      - github.com/AikidoSec/firewall-go/instrumentation/sinks/path
    template: |
      //go:linkname __aikido_path_ExamineDeferred github.com/AikidoSec/firewall-go/instrumentation/sinks/path.ExamineDeferred
      func __aikido_path_ExamineDeferred(string, []string) error

  - id: path.Join
    type: prepend
    package: path
    function: Join
    template: |
      __aikido_path_ExamineDeferred("path.Join", {{ .Function.Argument 0 }})

  - id: path.Clean
    type: prepend
    package: path
    function: Clean
    template: |
      __aikido_path_ExamineDeferred("path.Clean", []string{ {{ .Function.Argument 0 }} })
