meta:
  name: path
  description: Protection from Local File Inclusion (LFI) Attacks.

rules:
  # Inject go:linkname declarations for Examine and ExamineArg
  - id: path.Examine.linkname
    type: inject-decl
    package: path
    anchor: Join
    links:
      - github.com/AikidoSec/firewall-go/instrumentation/sinks/path
    template: |
      //go:linkname __aikido_path_Examine github.com/AikidoSec/firewall-go/instrumentation/sinks/path.Examine
      func __aikido_path_Examine(string, []string) error
      //go:linkname __aikido_path_ExamineArg github.com/AikidoSec/firewall-go/instrumentation/sinks/path.ExamineArg
      func __aikido_path_ExamineArg(string, string) error

  - id: path.Join
    type: prepend
    package: path
    function: Join
    template: |
      __aikido_path_Examine("path.Join", {{ .Function.Argument 0 }})

  - id: path.Clean
    type: prepend
    package: path
    function: Clean
    template: |
      __aikido_path_ExamineArg("path.Clean", {{ .Function.Argument 0 }})
