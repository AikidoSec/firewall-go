meta:
  name: os
  description: Protection from Local File Inclusion (LFI) Attacks.

rules:
  # Inject go:linkname declaration to access our Examine function from os package
  - id: os.linkname
    type: inject-decl
    package: os
    anchor: Getpid
    links:
      - github.com/AikidoSec/firewall-go/instrumentation/sinks/os
    template: |
      //go:linkname __aikido_os_Examine github.com/AikidoSec/firewall-go/instrumentation/sinks/os.Examine
      func __aikido_os_Examine(string) error

  # Prepend security check to os.OpenFile
  - id: os.OpenFile
    type: prepend
    package: os
    function: OpenFile
    template: |
      if __aikido_block := __aikido_os_Examine({{ .Function.Argument 0 }}); __aikido_block != nil {
        return nil, __aikido_block
      }
